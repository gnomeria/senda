name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".release-please-manifest.json"
      - "release-please-config.json"
      - "LICENSE"

jobs:
  backend:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      # The default (no build tag) Wails path targets GTK4 + webkitgtk-6.0 in
      # alpha2.104, so `go vet`/`go test` need those dev libs to compile
      # the desktop package (matches .github/workflows/release.yml).
      - name: Install GTK4 + WebKitGTK 6.0 (required by Wails imports)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev
          version: 1.0

      - name: Cache wails3 CLI
        id: cache-wails3
        uses: actions/cache@v4
        with:
          path: ~/go/bin/wails3
          key: wails3-${{ runner.os }}-${{ runner.arch }}-v3.0.0-alpha2.104

      - name: Install wails3 CLI
        if: steps.cache-wails3.outputs.cache-hit != 'true'
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha2.104

      - name: Generate TypeScript bindings
        run: TERM=dumb wails3 generate bindings -clean -ts

      - name: Create frontend/dist placeholder for go:embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: vet
        run: go vet ./...

      - name: fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt diff:"
            echo "$out"
            exit 1
          fi

      - name: test
        run: go test ./...

      - name: Upload generated bindings
        uses: actions/upload-artifact@v4
        with:
          name: wails-bindings
          path: frontend/bindings/

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: wails-bindings
          path: frontend/bindings/

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: frontend
        run: bun run typecheck

      - name: Unit tests
        working-directory: frontend
        run: bun run test --run

  e2e:
    name: E2E smoke (WebKit)
    # Pinned (not -latest) so the apt package list below stays valid — names
    # like libicu74 / *t64 are noble-specific. Bump deliberately with the list.
    runs-on: ubuntu-24.04
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: frontend/node_modules
          key: bun-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-${{ runner.arch }}-

      - name: Download generated bindings
        uses: actions/download-artifact@v4
        with:
          name: wails-bindings
          path: frontend/bindings/

      - name: Install dependencies
        working-directory: frontend
        run: bun install --frozen-lockfile

      # Cache the downloaded browser binary (~100 MB), keyed on the pinned
      # Playwright version in the lockfile.
      - name: Cache Playwright browser
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # WebKit's system libs are the real cost: `playwright install --with-deps`
      # pulls ~181 apt packages / 116 MB (gstreamer codec stack via recommends)
      # every run, since the runner VM is ephemeral. Install Playwright's exact
      # webkit deps via a cached apt layer instead — no recommends, restored
      # from cache. List = playwright-core's noble webkit deps; regenerate if
      # Playwright or the runner image is bumped. `version` busts the cache.
      - name: Install WebKit system deps (cached)
        uses: awalsh128/cache-apt-pkgs-action@v1
        with:
          version: pw1.61-noble
          packages: >-
            gstreamer1.0-libav gstreamer1.0-plugins-bad gstreamer1.0-plugins-base
            gstreamer1.0-plugins-good libatk-bridge2.0-0t64 libatk1.0-0t64
            libatomic1 libavif16 libcairo-gobject2 libcairo2 libdbus-1-3 libdrm2
            libenchant-2-2 libepoxy0 libevent-2.1-7t64 libflite1 libfontconfig1
            libfreetype6 libgbm1 libgdk-pixbuf-2.0-0 libgles2 libglib2.0-0t64
            libgstreamer-gl1.0-0 libgstreamer-plugins-bad1.0-0
            libgstreamer-plugins-base1.0-0 libgstreamer1.0-0 libgtk-4-1
            libharfbuzz-icu0 libharfbuzz0b libhyphen0 libicu74 libjpeg-turbo8
            liblcms2-2 libmanette-0.2-0 libopus0 libpango-1.0-0 libpangocairo-1.0-0
            libpng16-16t64 libsecret-1-0 libvpx9 libwayland-client0 libwayland-egl1
            libwayland-server0 libwebp7 libwebpdemux2 libwoff1 libx11-6 libx264-164
            libxkbcommon0 libxml2 libxslt1.1

      # Browser only (no --with-deps); skipped when the cache above hit.
      - name: Install Playwright WebKit browser
        working-directory: frontend
        run: bun run test:e2e:install

      - name: Run smoke tests
        working-directory: frontend
        run: bun run test:e2e
