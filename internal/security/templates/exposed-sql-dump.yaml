id: exposed-sql-dump

info:
  name: Exposed SQL Dump
  severity: high
  description: A database dump file is publicly downloadable.
  remediation: Remove dump files from the web root and rotate exposed credentials/data.
  tags: exposure,backup,owasp
  classification:
    cwe-id: CWE-530
  metadata:
    owasp: "API8:2023 Security Misconfiguration"

http:
  - method: GET
    path:
      - "{{RootURL}}/backup.sql"
      - "{{RootURL}}/dump.sql"
      - "{{RootURL}}/database.sql"
    stop-at-first-match: true
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        condition: or
        words:
          - "CREATE TABLE"
          - "INSERT INTO"
