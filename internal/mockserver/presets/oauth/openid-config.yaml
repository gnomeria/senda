name: oidc-discovery
# OIDC discovery document. Libraries that auto-configure from an issuer URL
# fetch this to learn the endpoint URLs. Update the host:port if you run the
# mock server on an address other than localhost:8787.
method: GET
path: /.well-known/openid-configuration
responses:
  - status: 200
    body:
      issuer: "http://localhost:8787"
      authorization_endpoint: "http://localhost:8787/authorize"
      token_endpoint: "http://localhost:8787/token"
      userinfo_endpoint: "http://localhost:8787/userinfo"
      response_types_supported: ["code"]
      grant_types_supported: ["authorization_code", "refresh_token"]
      scopes_supported: ["openid", "profile", "email"]
      token_endpoint_auth_methods_supported: ["client_secret_post", "client_secret_basic"]
